<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280">
  <defs>
    <linearGradient id="gold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#6B4A0E"/>
      <stop offset="28%"  stop-color="#C9931A"/>
      <stop offset="50%"  stop-color="#F2CC5A"/>
      <stop offset="72%"  stop-color="#C08A18"/>
      <stop offset="100%" stop-color="#6B4A0E"/>
    </linearGradient>
    <linearGradient id="silver" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="28%"  stop-color="#A8A8A8"/>
      <stop offset="50%"  stop-color="#EBEBEB"/>
      <stop offset="72%"  stop-color="#909090"/>
      <stop offset="100%" stop-color="#3A3A3A"/>
    </linearGradient>
    <linearGradient id="gold-h" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%"   stop-color="#8B6010"/>
      <stop offset="50%"  stop-color="#F0C845"/>
      <stop offset="100%" stop-color="#7A5010"/>
    </linearGradient>
  </defs>

  <!-- Fondo negro -->
  <rect width="280" height="280" fill="#0A0A09"/>

  <!-- D en plata (detrás) -->
  <text x="128" y="210"
    font-family="Fraunces, Georgia, 'Times New Roman', serif"
    font-size="195"
    font-weight="300"
    font-style="italic"
    fill="url(#silver)"
    opacity="0.92">D</text>

  <!-- L en oro (delante) -->
  <text x="18" y="210"
    font-family="Fraunces, Georgia, 'Times New Roman', serif"
    font-size="195"
    font-weight="300"
    font-style="italic"
    fill="url(#gold)">L</text>
</svg>
