---
layout: default
---

<article>
  <header class="post-header">
    <p class="post-date">{{ page.date | date: "%-d de %B de %Y" }}</p>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}">&larr; Volver al inicio</a>
  </nav>
</article>
