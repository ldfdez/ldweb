---
layout: default
---

<ul class="post-list">
  {% for post in site.posts %}
  <li class="post-item">
    <p class="post-date">{{ post.date | date: "%-d de %B de %Y" }}</p>
    <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
    <p class="post-excerpt">{{ post.excerpt | strip_html | truncate: 200 }}</p>
  </li>
  {% endfor %}
</ul>
